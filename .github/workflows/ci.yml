name: CI

on:
  pull_request:
    branches: [main, 'epic/*']
    # Skip CI on PRs that only touch documentation — saves runner minutes
    # on typo/wording PRs without losing signal. Code-touching PRs always
    # run; doc-touching paths added to a code PR don't filter out (any
    # non-ignored path triggers the workflow).
    #
    # Narrow ignore list — only ROOT-level Markdown / templates / LICENSE.
    # Do NOT match `**/*.md` recursively: src/CLAUDE.md, src/cli/CLAUDE.md,
    # `.claude/guidance/**/*.md`, and test fixtures under tests/ are all
    # functional (consumed by claudemd-generator, drift guards, and indexer
    # tests). Changing them MUST trigger CI.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - 'LICENSE'

env:
  NODE_VERSION: '22'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # See test job for context — postinstall clobber workaround.
      - name: Restore source after postinstall clobber
        run: git checkout -- .claude/helpers/ .claude/scripts/

      - name: Build all packages
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Verify CLI loads
        run: node bin/cli.js --version

      - name: Package (smoke test)
        run: npm pack --dry-run

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5
        with:
          # Several tests exercise git-history-walking behaviour (e.g.
          # tests/scripts/build-retired-files.test.ts verifies the retirement
          # hash-window walks full history for paths deleted commits ago).
          # The default shallow clone returns empty for `git log
          # --diff-filter=D` against an older deletion and fails those tests.
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Cache the fastembed model (~90 MB) across runs. Key includes the
      # lockfile hash so bumping fastembed invalidates automatically, and the
      # model name so swapping models never reuses a stale vector space. No
      # restore-keys — partial prefix matches could restore the wrong model's
      # binary blobs on a future model swap. A full miss is one ~90 MB
      # download, exactly what the cache exists to amortize.
      # See ADR-EMB-001 and epic #527.
      # continue-on-error: a cache is a pure speed optimization, so neither the
      # restore phase nor the post-step save may fail CI. A transient
      # cache-service error on restore must fall through to a cold ~90 MB
      # download, not turn a green run red (cf. release-smoke run 26378035867,
      # where an unguarded restore killed a Windows leg before any code ran).
      - name: Cache fastembed model
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-fast-all-MiniLM-L6-v2

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Pre-#937: the published moflo's postinstall bootstrapper clobbers
      # source .claude/helpers/* and .claude/scripts/* with stale published
      # artifacts when run as a devDependency. The fix in this PR
      # (scripts/post-install-bootstrap.mjs detecting
      # `consumerProjectRoot/package.json` name === "moflo") only takes effect
      # once a moflo with that fix is published and pinned. Until then,
      # restore source files from git after install.
      - name: Restore source after postinstall clobber
        run: git checkout -- .claude/helpers/ .claude/scripts/

      - name: Build all packages (tests import compiled output)
        run: npm run build

      - name: Run tests
        # Uses scripts/test-runner.mjs: parallel pass + sequential isolation pass.
        # Isolation tests (see isolationTests in vitest.config.ts) are files that
        # pass alone but timeout under parallel CI load — they must be exercised
        # in a dedicated second pass, which `npx vitest run` does not perform.
        run: npm test

  # Consumer smoke moved to .github/workflows/consumer-install-smoke.yml so it
  # also runs on push to main and gates /publish (issue #585).

  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # See test job for context — postinstall clobber workaround.
      - name: Restore source after postinstall clobber
        run: git checkout -- .claude/helpers/ .claude/scripts/

      - name: Lint
        run: npm run lint

      - name: Security audit
        # `--omit=dev` scopes the audit to production deps — what consumers
        # actually install. Dev-only vulns still surface in local `npm audit`
        # for maintainers but no longer gate PRs (the moflo self-devDep used
        # for dogfooding pulls our own previously-published transitives,
        # which intermittently lag behind security advisories until the next
        # publish ships).
        run: npm audit --omit=dev --audit-level=high
