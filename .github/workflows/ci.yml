name: CI

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all packages
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit --project src/modules/cli/tsconfig.json

      - name: Verify CLI loads
        run: node bin/cli.js --version

      - name: Package (smoke test)
        run: npm pack --dry-run

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Cache the fastembed model (~90 MB) across runs. Key includes the
      # lockfile hash so bumping fastembed invalidates automatically, and the
      # model name so swapping models never reuses a stale vector space. No
      # restore-keys — partial prefix matches could restore the wrong model's
      # binary blobs on a future model swap. A full miss is one ~90 MB
      # download, exactly what the cache exists to amortize.
      # See ADR-EMB-001 and epic #527.
      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-fast-all-MiniLM-L6-v2

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all packages (tests import compiled output)
        run: npm run build

      - name: Run tests
        # Uses scripts/test-runner.mjs: parallel pass + sequential isolation pass.
        # Isolation tests (see isolationTests in vitest.config.ts) are files that
        # pass alone but timeout under parallel CI load — they must be exercised
        # in a dedicated second pass, which `npx vitest run` does not perform.
        run: npm test

  smoke:
    name: Consumer smoke (${{ matrix.os }})
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # See the test job for cache-key rationale. `~/.cache/fastembed`
      # expands on all three runners (Linux/macOS/Windows) — actions/cache
      # resolves `~` via os.homedir() and fastembed agrees on the path.
      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-fast-all-MiniLM-L6-v2

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all packages
        run: npm run build

      - name: Run consumer smoke harness
        run: npm run test:smoke

  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high
