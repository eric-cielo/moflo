name: Consumer install smoke

# Issue #585: standalone gate for consumer-install packaging regressions.
#
# Tests moflo as a real consumer would — `npm pack` + scratch-dir install —
# rather than as an in-tree workspace where bare `@moflo/*` specifiers resolve
# via hoisting. This is the harness that would have caught the silent
# migration skip shipped in 4.8.87-rc.2 (regression test landed in #583,
# tracker test landed in PR for this issue).
#
# Required for /publish: keep this workflow as a required check on the
# protected branch so a release can never tag from a tree that fails here.

on:
  pull_request:
    branches: [main, 'epic/*']
    # Skip CI on PRs that only touch documentation. Smoke runs on Windows
    # cost ~10 minutes wall clock; doc-only PRs pay that cost for zero
    # signal. The drift-guard test still runs as part of the main CI
    # workflow's `Tests` job so consumer-shape regressions in CLAUDE.md
    # injection are still caught.
    # Narrow ignore list — only ROOT-level Markdown / templates / LICENSE.
    # Do NOT match `**/*.md` recursively: src/CLAUDE.md, src/cli/CLAUDE.md,
    # `.claude/guidance/**/*.md`, and shipped fixtures under tests/ are all
    # functional (consumed by claudemd-generator, drift guards, and indexer
    # tests). Changing them MUST trigger CI.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - 'LICENSE'
  push:
    branches: [main, 'epic/*']
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - 'LICENSE'

env:
  NODE_VERSION: '22'

# Cancel superseded PR runs but never cancel an in-flight push to main:
# a half-finished smoke on main leaves the branch in an unverified state and
# the next push has nothing to compare against.
concurrency:
  group: consumer-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    # Per-PR + push-to-main: ubuntu-only consumer and populated smoke.
    # Cross-OS coverage (mac + windows) runs in `release-smoke.yml` on
    # workflow_dispatch, gated by the /publish skill. This split exists
    # because mac runners bill at 10× and windows at 2× — paying that on
    # every doc tweak / typo fix was the dominant CI cost. Pre-split per-PR
    # cost was ~197 equivalent-minutes (the smoke matrix alone was ~182);
    # post-split per-PR cost is ~29 eq-min. The full matrix is paid once
    # per publish instead of once per PR.
    #
    # Job-name template ("${harness} / ${os}") is preserved verbatim so the
    # protected-branch required status checks `consumer / ubuntu-latest` and
    # `populated / ubuntu-latest` continue to post. The four removed mac +
    # windows contexts MUST be deleted from branch protection in the same
    # change that lands this file — see the PR body for the gh api call.
    name: ${{ matrix.harness }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        harness: [consumer, populated]
    runs-on: ${{ matrix.os }}
    # Acceptance criterion: < 5 min on Ubuntu. Cap all runners conservatively
    # so a stuck install can't hold the queue.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Caches the fastembed model (~90 MB). Key is keyed off the in-tree
      # model loader source (the only thing that can change the cache layout
      # or model URL) plus the model name. Was keyed off the lockfile hash,
      # but fastembed is a vendored in-tree module — lockfile changes don't
      # affect it, so keying on the lockfile invalidated the cache on every
      # routine dependency bump and forced a cold-fetch race on Windows
      # runners (issue #1021). No restore-keys — partial prefix matches could
      # restore the wrong model's binary blobs on a future model swap.
      # See ADR-EMB-001 / epic #527.
      # continue-on-error: a cache restore is a pure speed optimization. A
      # transient cache-service error on restore must never fail this gate —
      # the job falls through to a cold fastembed download instead. Mirrors the
      # continue-on-error already on the Save steps (release-smoke run
      # 26378035867 lost a Windows leg to an unguarded restore).
      - name: Restore fastembed model
        id: cache-fastembed
        continue-on-error: true
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ runner.os }}-${{ hashFiles('src/cli/embeddings/fastembed-inline/**/*.ts') }}-fast-all-MiniLM-L6-v2

      # Issue #1153 — cache the consumer-install node_modules tree across
      # runs. The cold path here used to be ~3 minutes on Windows; with a
      # warm donor the harness skips `npm install` and overlays the freshly-
      # packed moflo tgz on top of the cached deps (~30s on Windows).
      #
      # Key invariants:
      #   - Keyed per-runner-OS. NTFS file metadata doesn't restore cleanly
      #     onto POSIX runners (or vice-versa).
      #   - Keyed off the lockfile + postinstall scripts. Anything that
      #     would change the *dep tree* or the *postinstall side effects*
      #     (e.g. native-binary pruning logic) invalidates the cache.
      #   - The tgz hash is intentionally NOT in the key — the moflo source
      #     payload changes every commit; only deps + postinstall behavior
      #     matter for the cached layer. The harness overlays the fresh tgz
      #     post-restore, so test coverage of the current source is intact.
      #   - No restore-keys: a partial-prefix match could resurrect a stale
      #     transitive after a `package-lock.json` bump.
      # Restore/save split (not the combined actions/cache@v5) so the upload
      # post-step can carry continue-on-error — see the Save steps at the end
      # of the job. A transient cache-upload failure must never fail this gate.
      - name: Restore consumer-install node_modules
        id: cache-consumer-warm
        continue-on-error: true
        uses: actions/cache/restore@v5
        with:
          path: .work/consumer-warm
          key: consumer-warm-${{ runner.os }}-${{ matrix.harness }}-${{ hashFiles('package-lock.json', 'scripts/prune-native-binaries.mjs', 'scripts/post-install-bootstrap.mjs', 'scripts/post-install-notice.mjs') }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all packages
        run: npm run build

      - name: Run consumer smoke harness
        if: matrix.harness == 'consumer'
        run: npm run test:smoke -- --warm-donor .work/consumer-warm

      # Issue #736 — safety gate for stories #727/#728/#729/#735. Pre-split
      # this step reused the consumer-smoke tgz via --skip-pack; post-split
      # each harness packs independently (pack is ~3s on Windows, negligible
      # vs. the ~5m the split saves).
      - name: Run populated-consumer smoke harness
        if: matrix.harness == 'populated'
        run: npm run test:smoke:populated -- --warm-donor .work/consumer-warm

      # Save caches last with continue-on-error: a cache UPLOAD is an
      # optimization that runs after every product assertion, so a transient
      # actions/cache post-step failure must never fail this gate. Only save on
      # a miss; key is the restore step's resolved primary key.
      - name: Save fastembed model
        if: always() && steps.cache-fastembed.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/fastembed
          key: ${{ steps.cache-fastembed.outputs.cache-primary-key }}

      - name: Save consumer-install node_modules
        if: always() && steps.cache-consumer-warm.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .work/consumer-warm
          key: ${{ steps.cache-consumer-warm.outputs.cache-primary-key }}
