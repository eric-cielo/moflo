<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MoFlo dev.to cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1000px; height: 420px; background: #05050d; }
  .banner {
    position: relative;
    width: 1000px;
    height: 420px;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 34px;
    padding: 0 66px;
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(620px 420px at 15% 30%, rgba(56,189,248,0.30), transparent 60%),
      radial-gradient(560px 460px at 50% 70%, rgba(168,85,247,0.30), transparent 60%),
      radial-gradient(560px 420px at 88% 40%, rgba(74,222,128,0.24), transparent 62%),
      linear-gradient(135deg, #06060f 0%, #0a1030 55%, #08191d 100%);
  }
  /* subtle starfield / grain */
  .banner::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 22%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 70% 18%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1.5px 1.5px at 82% 78%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1.5px 1.5px at 35% 82%, rgba(255,255,255,0.20), transparent);
    pointer-events: none;
  }
  .logo {
    height: 250px;        /* native height — never upscaled, stays crisp */
    width: 400px;         /* native width */
    flex: 0 0 auto;
    filter: drop-shadow(0 0 26px rgba(80,180,255,0.45));
    z-index: 1;
  }
  .copy { z-index: 1; }
  .headline {
    color: #eaf6ff;
    font-weight: 800;
    font-size: 40px;
    line-height: 1.1;
    letter-spacing: -0.5px;
    text-shadow: 0 0 22px rgba(56,189,248,0.55), 0 2px 6px rgba(0,0,0,0.6);
  }
  .headline .accent {
    background: linear-gradient(90deg, #67e8f9, #a78bfa 55%, #6ee7b7);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .install {
    margin-top: 20px;
    display: inline-block;
    font-family: "SFMono-Regular", "Cascadia Code", "Consolas", ui-monospace, monospace;
    font-size: 17px;
    color: #bfe9ff;
    background: rgba(10,22,40,0.55);
    border: 1px solid rgba(103,232,249,0.35);
    border-radius: 8px;
    padding: 9px 15px;
    letter-spacing: 0.3px;
    box-shadow: inset 0 0 18px rgba(56,189,248,0.12);
  }
  .install .p { color: #6ee7b7; }
</style>
</head>
