name: outlook-attachment-processor
abbreviation: oap
description: >
  Reads 10 most recent Outlook.com emails, downloads any attachments
  to ~/Downloads/attachments/, then sends a summary email via Outlook
  to eric@ericswann.org. Uses the local outlook step command —
  no API keys or Azure required.
version: "3.0"
mofloLevel: memory

arguments:
  recipient:
    type: string
    required: false
    default: "eric@ericswann.org"
    description: Email address to receive the processing summary
  maxEmails:
    type: number
    required: false
    default: 10
    description: Number of recent emails to scan
  downloadDir:
    type: string
    required: false
    default: "~/Downloads/attachments"
    description: Directory to save attachments

steps:
  # 1. Ensure download directory exists
  - id: ensure-dir
    type: bash
    config:
      command: "mkdir -p {args.downloadDir}"

  # 2. Read the inbox
  - id: read-inbox
    type: outlook
    config:
      action: read-inbox
      limit: "{args.maxEmails}"
      headless: true
    output: inbox

  # 3. For each email with attachments, download them
  - id: download-attachments
    type: loop
    config:
      items: "{inbox.emails}"
      steps:
        - id: check-attachment
          type: condition
          config:
            expression: "{item.hasAttachment} === true"
            then: do-download

        - id: do-download
          type: outlook
          config:
            action: download-attachments
            emailIndex: "{item.index}"
            downloadDir: "{args.downloadDir}"
            headless: true

  # 4. Build and send the summary email
  - id: build-summary
    type: agent
    config:
      prompt: |
        Build a plain-text summary of this email processing run.

        Inbox data: {inbox.emails}
        Total emails: {inbox.totalEmails}
        Emails with attachments: {inbox.emailsWithAttachments}
        Download directory: {args.downloadDir}

        Format:
        - Header with date/time of run
        - Total emails scanned and attachment count
        - For each email: subject, sender, date
          - If it had attachments, list them
        - Footer with download directory path

        Return ONLY the summary text, no JSON wrapping.
    output: summary

  - id: send-summary
    type: outlook
    config:
      action: send-email
      to: "{args.recipient}"
      subject: "Outlook Attachment Processor - Summary Report"
      body: "{build-summary.result}"
      headless: true

  # 5. Log the run
  - id: log-run
    type: memory
    config:
      operation: write
      namespace: spell-runs
      key: "outlook-attachment-processor-latest"
      value: |
        Processed {inbox.totalEmails} emails,
        {inbox.emailsWithAttachments} had attachments.
        Summary sent to {args.recipient}.
