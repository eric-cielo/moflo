name: outlook-attachment-processor
abbreviation: oap
description: >
  Scans Microsoft Graph /me/messages for emails newer than a start date,
  downloads any attachments to ~/Downloads/attachments/, then posts a
  summary to Slack. Uses GRAPH_ACCESS_TOKEN env (Graph Explorer token
  works for quick tests; ~1h lifetime). Requires SLACK_WEBHOOK_URL.
version: "5.1"
mofloLevel: memory

arguments:
  maxEmails:
    type: number
    required: false
    default: 25
  sinceDays:
    type: number
    required: false
    default: 7
  downloadDir:
    type: string
    required: false
    default: "~/Downloads/attachments"

prerequisites:
  - name: GRAPH_ACCESS_TOKEN
    description: >
      Microsoft Graph access token for reading your Outlook/Microsoft 365 inbox.
      Get one (expires in ~1h): open Graph Explorer, sign in with the account
      whose mailbox you want to scan, click the "Access token" tab, copy the token.
    docsUrl: https://developer.microsoft.com/en-us/graph/graph-explorer
    detect:
      type: env
      key: GRAPH_ACCESS_TOKEN
    promptOnMissing: true

  - name: SLACK_WEBHOOK_URL
    description: >
      Slack incoming-webhook URL for the scan summary notification.
      Get one: open https://api.slack.com/apps, pick or create an app, enable
      Incoming Webhooks, "Add New Webhook to Workspace", pick the target channel,
      copy the https://hooks.slack.com/... URL.
    docsUrl: https://api.slack.com/messaging/webhooks
    detect:
      type: env
      key: SLACK_WEBHOOK_URL
    promptOnMissing: true

steps:
  - id: ensure-dir
    type: bash
    config:
      command: |
        node -e "var fs=require('fs'),os=require('os');var d='{args.downloadDir}'.replace(/^~/,os.homedir());var o=new Object();o.recursive=true;fs.mkdirSync(d,o);console.log(d);"

  - id: last-run
    type: memory
    config:
      action: read
      namespace: spell-state
      key: "outlook-attachment-processor:last-processed-at"
    output: lastRun

  - id: ask-start-date
    type: prompt
    config:
      message: "Inbox start date (ISO, e.g. 2026-04-10T00:00:00Z)"
      default: "{lastRun.value}"
      fallbackDaysAgo: "{args.sinceDays}"
    output: startDate

  - id: read-inbox
    type: graph
    config:
      action: read-inbox
      accessToken: "{env.GRAPH_ACCESS_TOKEN}"
      limit: "{args.maxEmails}"
      sinceDate: "{startDate.response}"
    output: inbox

  - id: download-attachments
    type: loop
    config:
      over: "{inbox.emails}"
    steps:
      - id: check-attachment
        type: condition
        config:
          left: "has:{loop.item.hasAttachment}"
          op: "=="
          right: "has:true"
          then: do-download

      - id: do-download
        type: graph
        config:
          action: download-attachments
          accessToken: "{env.GRAPH_ACCESS_TOKEN}"
          id: "{loop.item.id}"
          downloadDir: "{args.downloadDir}"

  - id: notify-slack
    type: slack
    config:
      action: post-webhook
      webhookUrl: "{env.SLACK_WEBHOOK_URL}"
      text: |
        📧 Inbox scan complete
        Scanned since: {inbox.sinceDate}
        Emails matched: {inbox.totalEmails} (raw scan: {inbox.totalBeforeFilter})
        With attachments: {inbox.emailsWithAttachments}
        Download dir: {args.downloadDir}

  - id: save-timestamp
    type: memory
    config:
      action: write
      namespace: spell-state
      key: "outlook-attachment-processor:last-processed-at"
      value: "{inbox.newestTimestamp}"

  - id: log-run
    type: memory
    config:
      action: write
      namespace: spell-runs
      key: "outlook-attachment-processor-latest"
      value: |
        Scanned since {inbox.sinceDate}; matched {inbox.totalEmails} emails,
        {inbox.emailsWithAttachments} with attachments. Slack notified.
