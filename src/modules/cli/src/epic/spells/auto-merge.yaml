name: epic-auto-merge
abbreviation: eam
description: >
  Epic processing with auto-merge strategy.
  Each story gets its own branch and PR, squash-merged before the next story.
version: "1.0.0"

arguments:
  epic_number:
    type: number
    required: true
    description: "Epic issue number"
  base_branch:
    type: string
    required: false
    default: "main"
    description: "Base branch for story branches"
  stories:
    type: string[]
    required: true
    description: "Array of story issue numbers"
  admin_merge:
    type: boolean
    required: false
    default: false
    description: "Use --admin flag for merge operations"
  merge_method:
    type: string
    required: false
    default: "squash"
    description: "PR merge method (squash, merge, rebase)"

mofloLevel: hooks

steps:
  # Step 1: Initialize epic state in memory (enables resume)
  - id: init-state
    type: memory
    config:
      action: "write"
      namespace: "epic-state"
      key: "epic-{args.epic_number}"
      value:
        status: "in-progress"
        strategy: "auto-merge"
        stories: "{args.stories}"

  # Loop over stories sequentially
  - id: process-stories
    type: loop
    config:
      over: "{args.stories}"
      itemVar: "story_number"
    output: story_results
    steps:
      # 1: Checkout and pull latest base branch
      # Preflights run once BEFORE any step (not per iteration) — fail fast
      # on dirty tree, missing auth, or unreachable remote.
      - id: checkout-base
        type: bash
        preflight:
          - name: "no unmerged files"
            command: "git diff --name-only --diff-filter=U"
            expectExitCode: 0
            hint: "You have unresolved merge conflicts. Resolve them and commit before running this spell."
          - name: "working tree clean (tracked changes)"
            command: "git diff --quiet"
            severity: "warning"
            hint: "You have uncommitted changes to tracked files. If you want them carried onto the epic branch, pick 'Stash and carry over'."
            resolutions:
              - label: "Stash changes and carry them onto the epic branch"
                command: "git stash push --include-untracked --message 'moflo-epic-autostash'"
              - label: "Commit changes to the current branch first, then continue"
                command: "git commit -am 'wip: pre-epic snapshot'"
          - name: "working tree clean (staged changes)"
            command: "git diff --cached --quiet"
            severity: "warning"
            hint: "You have staged changes that aren't committed. If you want them carried onto the epic branch, pick 'Stash and carry over'."
            resolutions:
              - label: "Stash staged changes and carry them onto the epic branch"
                command: "git stash push --include-untracked --message 'moflo-epic-autostash'"
              - label: "Commit staged changes to the current branch first, then continue"
                command: "git commit -m 'wip: pre-epic snapshot'"
          - name: "gh cli authenticated"
            command: "gh auth status"
            hint: "The GitHub CLI isn't signed in. Run: gh auth login"
          - name: "origin remote configured"
            command: "git remote get-url origin"
            hint: "This repo has no 'origin' remote. Set one with: git remote add origin <url>"
        config:
          # set -e: fail fast if checkout/pull fails; otherwise the trailing
          # `stash pop ... || true` would mask the real failure.
          command: "set -e; git stash --include-untracked -q 2>/dev/null || true; git checkout {args.base_branch}; git pull origin {args.base_branch}; git stash pop -q 2>/dev/null || true"
          failOnError: true

      # 2: Spawn Claude agent to implement the story (creates branch + PR)
      - id: implement-story
        type: bash
        permissionLevel: elevated
        config:
          command: "export PATH=\"$HOME/.local/bin:$PATH\" && claude -p \"Read GitHub issue #{loop.story_number} using gh issue view {loop.story_number}. Implement exactly what the issue asks for. Create a branch, commit your changes with a message referencing the issue number, push the branch, and create a PR.\""
          timeout: 300000
          failOnError: true

      # 3: Find the story's PR
      - id: find-story-pr
        type: github
        config:
          action: "pr-find"
          search: "Closes #{loop.story_number}"
        output: found_pr

      # 4: Merge the PR
      - id: merge-story-pr
        type: github
        config:
          action: "pr-merge"
          pr: "{found_pr.prs[0].number}"
          mergeMethod: "{args.merge_method}"
          deleteBranch: true
          admin: "{args.admin_merge}"

      # 5: Pull merged changes
      - id: pull-merged
        type: bash
        config:
          # set -e: fail fast if checkout/pull fails (see checkout-base).
          command: "set -e; git stash --include-untracked -q 2>/dev/null || true; git checkout {args.base_branch}; git pull origin {args.base_branch}; git stash pop -q 2>/dev/null || true"
          failOnError: true

      # 6: Comment on epic with progress
      - id: comment-progress
        type: github
        config:
          action: "comment"
          issue: "{args.epic_number}"
          body: "Story #{loop.story_number} merged via auto-merge strategy"

      # 7: Record completion in memory
      - id: record-completion
        type: memory
        config:
          action: "write"
          namespace: "epic-state"
          key: "story-{loop.story_number}"
          value:
            status: "merged"
            epic: "{args.epic_number}"

  # Mark epic as completed in memory
  - id: finalize-state
    type: memory
    config:
      action: "write"
      namespace: "epic-state"
      key: "epic-{args.epic_number}"
      value:
        status: "completed"
        strategy: "auto-merge"
        stories: "{args.stories}"
