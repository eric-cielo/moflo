name: epic-auto-merge
abbreviation: eam
description: >
  Epic processing with auto-merge strategy.
  Each story gets its own branch and PR, squash-merged before the next story.
version: "1.0.0"

arguments:
  epic_number:
    type: number
    required: true
    description: "Epic issue number"
  base_branch:
    type: string
    required: false
    default: "main"
    description: "Base branch for story branches"
  stories:
    type: string[]
    required: true
    description: "Array of story issue numbers"
  admin_merge:
    type: boolean
    required: false
    default: false
    description: "Use --admin flag for merge operations"
  merge_method:
    type: string
    required: false
    default: "squash"
    description: "PR merge method (squash, merge, rebase)"

mofloLevel: hooks

steps:
  # Step 0: Pre-flight — fail fast if worktree is dirty or has unmerged files
  - id: preflight-check
    type: bash
    config:
      command: "if [ -n \"$(git diff --name-only --diff-filter=U 2>/dev/null)\" ]; then echo 'ERROR: Unmerged files detected. Resolve conflicts before running epic.' >&2; git diff --name-only --diff-filter=U 2>/dev/null >&2; exit 1; fi && if [ -n \"$(git -c core.autocrlf=false -c core.safecrlf=false status --porcelain 2>/dev/null)\" ]; then echo 'ERROR: Working tree is dirty. Commit, stash, or discard changes before running epic.' >&2; git -c core.autocrlf=false -c core.safecrlf=false status --short 2>/dev/null >&2; exit 1; fi"
      timeout: 120000
      failOnError: true

  # Step 1: Initialize epic state in memory (enables resume)
  - id: init-state
    type: memory
    config:
      action: "write"
      namespace: "epic-state"
      key: "epic-{args.epic_number}"
      value:
        status: "in-progress"
        strategy: "auto-merge"
        stories: "{args.stories}"

  # Loop over stories sequentially
  - id: process-stories
    type: loop
    config:
      over: "{args.stories}"
      itemVar: "story_number"
    output: story_results
    steps:
      # 1: Checkout and pull latest base branch
      - id: checkout-base
        type: bash
        config:
          command: "git stash --include-untracked -q 2>/dev/null; git checkout {args.base_branch} && git pull origin {args.base_branch}; git stash pop -q 2>/dev/null || true"
          failOnError: true

      # 2: Spawn Claude agent to implement the story (creates branch + PR)
      - id: implement-story
        type: bash
        permissionLevel: elevated
        config:
          command: "export PATH=\"$HOME/.local/bin:$PATH\" && claude -p \"Read GitHub issue #{loop.story_number} using gh issue view {loop.story_number}. Implement exactly what the issue asks for. Create a branch, commit your changes with a message referencing the issue number, push the branch, and create a PR.\""
          timeout: 300000
          failOnError: true

      # 3: Find the story's PR
      - id: find-story-pr
        type: github
        config:
          action: "pr-find"
          search: "Closes #{loop.story_number}"
        output: found_pr

      # 4: Merge the PR
      - id: merge-story-pr
        type: github
        config:
          action: "pr-merge"
          pr: "{found_pr.prs[0].number}"
          mergeMethod: "{args.merge_method}"
          deleteBranch: true
          admin: "{args.admin_merge}"

      # 5: Pull merged changes
      - id: pull-merged
        type: bash
        config:
          command: "git stash --include-untracked -q 2>/dev/null; git checkout {args.base_branch} && git pull origin {args.base_branch}; git stash pop -q 2>/dev/null || true"
          failOnError: true

      # 6: Comment on epic with progress
      - id: comment-progress
        type: github
        config:
          action: "comment"
          issue: "{args.epic_number}"
          body: "Story #{loop.story_number} merged via auto-merge strategy"

      # 7: Record completion in memory
      - id: record-completion
        type: memory
        config:
          action: "write"
          namespace: "epic-state"
          key: "story-{loop.story_number}"
          value:
            status: "merged"
            epic: "{args.epic_number}"

  # Mark epic as completed in memory
  - id: finalize-state
    type: memory
    config:
      action: "write"
      namespace: "epic-state"
      key: "epic-{args.epic_number}"
      value:
        status: "completed"
        strategy: "auto-merge"
        stories: "{args.stories}"
