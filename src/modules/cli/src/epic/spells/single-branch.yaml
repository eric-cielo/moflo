name: epic-single-branch
abbreviation: esb
description: >
  Epic processing with single-branch strategy.
  All stories commit to one shared branch, one consolidated PR at the end.
version: "1.0.0"

arguments:
  epic_number:
    type: number
    required: true
    description: "Epic issue number"
  base_branch:
    type: string
    required: false
    default: "main"
    description: "Base branch to create epic branch from"
  stories:
    type: string[]
    required: true
    description: "Array of story issue numbers"
  epic_slug:
    type: string
    required: false
    default: "epic"
    description: "Short slug for epic branch name"
  admin_merge:
    type: boolean
    required: false
    default: false
    description: "Use --admin flag for merge operations"
  merge_method:
    type: string
    required: false
    default: "squash"
    description: "PR merge method (squash, merge, rebase)"

mofloLevel: hooks

steps:
  # Step 1: Initialize epic state in memory (enables resume)
  - id: init-state
    type: memory
    config:
      action: "write"
      namespace: "epic-state"
      key: "epic-{args.epic_number}"
      value:
        status: "in-progress"
        strategy: "single-branch"
        stories: "{args.stories}"
        branch: "epic/{args.epic_number}-{args.epic_slug}"

  # Step 2: Create epic branch from base
  # Preflights run BEFORE any step — fail fast on dirty tree or auth issues
  - id: create-branch
    type: bash
    preflight:
      - name: "no unmerged files"
        command: "git diff --name-only --diff-filter=U"
        expectExitCode: 0
        hint: "You have unresolved merge conflicts. Resolve them and commit before running this spell."
      - name: "working tree clean (tracked changes)"
        command: "git diff --quiet"
        severity: "warning"
        hint: "You have uncommitted changes to tracked files. If you want them carried onto the epic branch, pick 'Stash and carry over'."
        resolutions:
          - label: "Stash changes and carry them onto the epic branch"
            command: "git stash push --include-untracked --message 'moflo-epic-autostash'"
          - label: "Commit changes to the current branch first, then continue"
            command: "git commit -am 'wip: pre-epic snapshot'"
      - name: "working tree clean (staged changes)"
        command: "git diff --cached --quiet"
        severity: "warning"
        hint: "You have staged changes that aren't committed. If you want them carried onto the epic branch, pick 'Stash and carry over'."
        resolutions:
          - label: "Stash staged changes and carry them onto the epic branch"
            command: "git stash push --include-untracked --message 'moflo-epic-autostash'"
          - label: "Commit staged changes to the current branch first, then continue"
            command: "git commit -m 'wip: pre-epic snapshot'"
      - name: "gh cli authenticated"
        command: "gh auth status"
        hint: "The GitHub CLI isn't signed in. Run: gh auth login"
    config:
      command: "git stash --include-untracked -q 2>/dev/null; git checkout {args.base_branch} && git pull origin {args.base_branch} && (git show-ref --verify --quiet refs/heads/epic/{args.epic_number}-{args.epic_slug} && git checkout epic/{args.epic_number}-{args.epic_slug} || git checkout -b epic/{args.epic_number}-{args.epic_slug}); git stash pop -q 2>/dev/null || true"
      timeout: 120000
      failOnError: true

  # Step 2: Loop over stories sequentially
  - id: process-stories
    type: loop
    config:
      over: "{args.stories}"
      itemVar: "story_number"
    output: story_results
    steps:
      # 2a: Spawn Claude agent to implement the story and commit to epic branch
      - id: implement-story
        type: bash
        permissionLevel: elevated
        config:
          command: "export PATH=\"$HOME/.local/bin:$PATH\" && claude -p \"Read GitHub issue #{loop.story_number} using gh issue view {loop.story_number}. Implement exactly what the issue asks for — nothing more. Commit your changes with a message referencing the issue number. Do not create a branch or PR.\""
          timeout: 600000
          failOnError: true

      # 2b: Check off story in epic body
      - id: check-off-story
        type: github
        config:
          action: "comment"
          issue: "{args.epic_number}"
          body: "Story #{loop.story_number} committed to epic branch"

      # 2c: Record completion in memory
      - id: record-completion
        type: memory
        config:
          action: "write"
          namespace: "epic-state"
          key: "story-{loop.story_number}"
          value:
            status: "completed"
            epic: "{args.epic_number}"

  # Step 3: Push epic branch
  # Preflight: verify origin remote exists so push won't fail mid-way
  - id: push-branch
    type: bash
    preflight:
      - name: "origin remote configured"
        command: "git remote get-url origin"
    config:
      command: "git push -u origin epic/{args.epic_number}-{args.epic_slug}"
      timeout: 120000
      failOnError: true

  # Step 4: Create consolidated PR
  - id: create-pr
    type: github
    config:
      action: "pr-create"
      title: "epic(#{args.epic_number}): consolidated epic PR"
      body: "## Epic #{args.epic_number}\n\nConsolidated PR for all stories.\n\nCloses #{args.epic_number}"
      base: "{args.base_branch}"
      head: "epic/{args.epic_number}-{args.epic_slug}"

  # Step 5: Mark epic as completed in memory
  - id: finalize-state
    type: memory
    config:
      action: "write"
      namespace: "epic-state"
      key: "epic-{args.epic_number}"
      value:
        status: "completed"
        strategy: "single-branch"
        stories: "{args.stories}"
        branch: "epic/{args.epic_number}-{args.epic_slug}"
